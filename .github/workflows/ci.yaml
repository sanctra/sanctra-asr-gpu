name: CI
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: asr-gpu-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Build GPU image locally only
        run: |
          docker build -f Dockerfile.gpu -t sanctra-asr-gpu:${{ github.sha }} .
